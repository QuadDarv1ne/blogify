version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - blog_network
    depends_on:
      - database
      - redis

  webserver:
    image: nginx:alpine
    container_name: blog_webserver
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - blog_network
    depends_on:
      - app

  database:
    image: mysql:8.0
    container_name: blog_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-blog}
      MYSQL_USER: ${DB_USERNAME:-blog}
      MYSQL_PASSWORD: ${DB_PASSWORD:-blog}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blog_network

  redis:
    image: redis:alpine
    container_name: blog_redis
    restart: unless-stopped
    networks:
      - blog_network

networks:
  blog_network:
    driver: bridge

volumes:
  mysql_data:
